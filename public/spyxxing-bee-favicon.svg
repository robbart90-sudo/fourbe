  <rect x="2" y="19" width="7" height="7" rx="1" fill="#F5F0E8"/>
  <text x="5.5" y="24.2" font-family="Arial,sans-serif" font-weight="bold" font-size="5.5" fill="#1A1A1A" fill-opacity="0.35" text-anchor="middle">X</text>
