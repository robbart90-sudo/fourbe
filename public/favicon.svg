<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Row 1: 3 green -->
  <rect x="1" y="1" width="8" height="8" rx="1.5" fill="#6aaa64"/>
  <rect x="11" y="1" width="8" height="8" rx="1.5" fill="#6aaa64"/>
  <rect x="21" y="1" width="8" height="8" rx="1.5" fill="#6aaa64"/>
  <!-- Row 2: 1 green, 2 outlined -->
  <rect x="1" y="11" width="8" height="8" rx="1.5" fill="#6aaa64"/>
  <rect x="11" y="11" width="8" height="8" rx="1.5" fill="none" stroke="#1a1a1b" stroke-width="1.5"/>
  <rect x="21" y="11" width="8" height="8" rx="1.5" fill="none" stroke="#1a1a1b" stroke-width="1.5"/>
  <!-- Row 3: 2 green, 1 outlined -->
  <rect x="1" y="21" width="8" height="8" rx="1.5" fill="#6aaa64"/>
  <rect x="11" y="21" width="8" height="8" rx="1.5" fill="#6aaa64"/>
  <rect x="21" y="21" width="8" height="8" rx="1.5" fill="none" stroke="#1a1a1b" stroke-width="1.5"/>
</svg>
