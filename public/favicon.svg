<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 3x4 grid, only green F squares shown, 6px cells with 2px gaps -->
  <!-- Row 1: 3 green (top bar) -->
  <rect x="1" y="1" width="8" height="6" rx="1" fill="#6aaa64"/>
  <rect x="11" y="1" width="8" height="6" rx="1" fill="#6aaa64"/>
  <rect x="21" y="1" width="8" height="6" rx="1" fill="#6aaa64"/>
  <!-- Row 2: 1 green (stem) -->
  <rect x="1" y="9" width="8" height="6" rx="1" fill="#6aaa64"/>
  <!-- Row 3: 2 green (middle bar) -->
  <rect x="1" y="17" width="8" height="6" rx="1" fill="#6aaa64"/>
  <rect x="11" y="17" width="8" height="6" rx="1" fill="#6aaa64"/>
  <!-- Row 4: 1 green (stem) -->
  <rect x="1" y="25" width="8" height="6" rx="1" fill="#6aaa64"/>
</svg>
