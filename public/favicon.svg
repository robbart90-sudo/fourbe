<svg width="76" height="76" viewBox="0 0 76 76" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Top row - all green filled -->
  <rect x="4" y="4" width="14" height="14" rx="2" fill="#6aaa64"/>
  <rect x="22" y="4" width="14" height="14" rx="2" fill="#6aaa64"/>
  <rect x="40" y="4" width="14" height="14" rx="2" fill="#6aaa64"/>

  <!-- Second row - left green, middle and right blue outline -->
  <rect x="4" y="22" width="14" height="14" rx="2" fill="#6aaa64"/>
  <rect x="22" y="22" width="14" height="14" rx="2" stroke="#5b9bd5" stroke-width="2" fill="none"/>
  <rect x="40" y="22" width="14" height="14" rx="2" stroke="#5b9bd5" stroke-width="2" fill="none"/>

  <!-- Third row - left and middle green, right blue outline -->
  <rect x="4" y="40" width="14" height="14" rx="2" fill="#6aaa64"/>
  <rect x="22" y="40" width="14" height="14" rx="2" fill="#6aaa64"/>
  <rect x="40" y="40" width="14" height="14" rx="2" stroke="#5b9bd5" stroke-width="2" fill="none"/>

  <!-- Bottom row - left green, middle and right blue outline -->
  <rect x="4" y="58" width="14" height="14" rx="2" fill="#6aaa64"/>
  <rect x="22" y="58" width="14" height="14" rx="2" stroke="#5b9bd5" stroke-width="2" fill="none"/>
  <rect x="40" y="58" width="14" height="14" rx="2" stroke="#5b9bd5" stroke-width="2" fill="none"/>
</svg>
