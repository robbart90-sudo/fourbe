<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#ffffff"/>
  <!-- Fourbe grid icon: 2x2 with green filled + black outlined -->
  <g transform="translate(520, 140)">
    <rect x="0" y="0" width="60" height="60" rx="6" fill="#6aaa64"/>
    <rect x="80" y="0" width="60" height="60" rx="6" fill="#6aaa64"/>
    <rect x="0" y="80" width="60" height="60" rx="6" fill="none" stroke="#1a1a1b" stroke-width="3"/>
    <rect x="80" y="80" width="60" height="60" rx="6" fill="none" stroke="#1a1a1b" stroke-width="3"/>
  </g>
  <!-- FOURBE text -->
  <text x="600" y="400" font-family="Georgia, 'Playfair Display', serif" font-weight="800" font-size="72" fill="#1a1a1b" text-anchor="middle" letter-spacing="-2">FOURBE</text>
  <!-- Tagline -->
  <text x="600" y="460" font-family="Georgia, serif" font-size="28" fill="#1a1a1b" fill-opacity="0.5" text-anchor="middle">Four clues. One hidden subject.</text>
</svg>
