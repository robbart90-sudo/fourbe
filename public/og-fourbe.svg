<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#ffffff"/>
  <!-- FourbeLogo: 4 rows × 3 cols, cell=56px, gap=6px -->
  <!-- Total grid: width = 56*3 + 6*2 = 180, height = 56*4 + 6*3 = 242 -->
  <!-- Center horizontally: x = (1200 - 180) / 2 = 510 -->
  <!-- Vertical offset: y = 80 (leave room for text below) -->
  <g transform="translate(510, 80)">
    <!-- Row 1: 3 green -->
    <rect x="0" y="0" width="56" height="56" rx="6" fill="#6aaa64"/>
    <rect x="62" y="0" width="56" height="56" rx="6" fill="#6aaa64"/>
    <rect x="124" y="0" width="56" height="56" rx="6" fill="#6aaa64"/>
    <!-- Row 2: 1 green + 2 outlined -->
    <rect x="0" y="62" width="56" height="56" rx="6" fill="#6aaa64"/>
    <rect x="62" y="62" width="56" height="56" rx="6" fill="none" stroke="#1a1a1b" stroke-width="2"/>
    <rect x="124" y="62" width="56" height="56" rx="6" fill="none" stroke="#1a1a1b" stroke-width="2"/>
    <!-- Row 3: 2 green + 1 outlined -->
    <rect x="0" y="124" width="56" height="56" rx="6" fill="#6aaa64"/>
    <rect x="62" y="124" width="56" height="56" rx="6" fill="#6aaa64"/>
    <rect x="124" y="124" width="56" height="56" rx="6" fill="none" stroke="#1a1a1b" stroke-width="2"/>
    <!-- Row 4: 1 green + 2 outlined -->
    <rect x="0" y="186" width="56" height="56" rx="6" fill="#6aaa64"/>
    <rect x="62" y="186" width="56" height="56" rx="6" fill="none" stroke="#1a1a1b" stroke-width="2"/>
    <rect x="124" y="186" width="56" height="56" rx="6" fill="none" stroke="#1a1a1b" stroke-width="2"/>
  </g>
  <!-- FOURBE text -->
  <text x="600" y="420" font-family="'Playfair Display', Georgia, serif" font-weight="800" font-size="72" fill="#1a1a1b" text-anchor="middle" letter-spacing="-2">FOURBE</text>
  <!-- Tagline -->
  <text x="600" y="475" font-family="Georgia, serif" font-size="28" fill="#1a1a1b" fill-opacity="0.5" text-anchor="middle">Four clues. One hidden subject.</text>
</svg>
